<script>
    $(function () {
        var href = location.href
            , username = href.split("=")[1];
            var _type = getQueryVariable("type");
            if(_type == "speed"){
                $(".user-content-li").hide();
                $(".statistic-content-li").hide();
                $(".container").hide();
                $(".speed-content-li").show();
                $(".left-nav").css("top","0px");
                $(".page-content").css("top","0px");
            }else if(_type == "statistic"){
                $(".user-content-li").hide();
                $(".statistic-content-li").show();
                $(".speed-content-li").hide();
                $(".container").hide();
                $(".left-nav").css("top","0px");
                $(".page-content").css("top","0px");
            }else{
                $(".user-content-li").show();
                $(".statistic-content-li").show();
                $(".speed-content-li").show();
                $(".container").show();
                $(".left-nav").css("top","45px");
                $(".page-content").css("top","45px");
            }


        $("#username").html(username);
    });


    //获取地址中的值
    function getQueryVariable(variable) {
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i = 0; i < vars.length; i++) {
            var pair = vars[i].split("=");
            if (pair[0] == variable) {
                return pair[1];
            }
        }
        return (null);
    }
</script>

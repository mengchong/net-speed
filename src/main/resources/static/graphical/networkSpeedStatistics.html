<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>测速统计</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <link rel="stylesheet" href="../js/lib/layui/css/layui.css">
    <link rel="stylesheet" href="../css/font.css">
    <link rel="stylesheet" href="../css/xadmin.css">
    <script src="../js/lib/layui/layui.js" charset="utf-8"></script>
    <script type="text/javascript" src="../js/xadmin.js"></script>
    <script type="text/javascript" src="../js/echarts.min.js"></script>
    <script type="text/javascript" src="networkSpeedStatistics.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

    <style>
        #main1 {
            width: 95%;
            height: 300px;
            padding-left: 3%
        }
        .layui-table-grid-down{
            display: none;
        }
    </style>
</head>
<body>
<div class="x-nav">
          <span class="layui-breadcrumb">
            <a>
              <cite>测速统计</cite></a>
          </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i></a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body ">
                    <form class="layui-form layui-col-space5" style="float: left">
                        <div class="layui-input-inline layui-show-xs-block" lay-filter="selFilterScene">
                            <select name="selectScene" id="sceneSelect">

                            </select>
                        </div>
                        <div class="layui-input-inline layui-show-xs-block" lay-filter="selFilterArea">
                            <select name="selectArea" id="areaSelect">

                            </select>
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <input class="layui-input" autocomplete="off" placeholder="开始日" name="startTime"
                                   id="startTime">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <input class="layui-input" autocomplete="off" placeholder="截止日" name="endTime" id="endTime">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <a class="layui-btn" id="submit" data-type="reload" lay-submit="submit" lay-filter="search"><i
                                    class="layui-icon">&#xe615;</i></a>
                        </div>
                    </form>
                    <button class="layui-btn" id="export" style="margin-left: 1%">
                        <i class="iconfont"></i> 导出
                    </button>
                </div>

                <div class="layui-card-body">
                    <div id="main1" class="layui-col-space5"></div>
                </div>

                <div class="layui-card-body layui-table-body layui-table-main" style="padding-left: 4%">
                    <table class="layui-table layui-form" id="contentTable" lay-filter="tableEvent">

                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

<div class="layui-layer-shade" id="layui-layer-shade1" times="1"
     style="z-index: 19891014;background-color: rgb(0, 0, 0);opacity: 0.4;display: none"></div>

<div class="layui-layer" id="layui-layer1" times="1" showtime="0" contype="string"
     style="z-index: 19891015; width: 100%; height: 700px; top: 100px; display: none;overflow: auto" align="center">
    <button class="layui-btn" id="exportData" style="float: left;margin: 10px 0 10px 10px">
        <i class="iconfont"></i> 导出
    </button>
    <span class="layui-layer-setwin"><a
            class="layui-layer-ico layui-layer-close layui-layer-close1" href="javascript:;"></a></span>
    <table class="layui-table layui-form" style="margin-top: 25px" id="dataTable" lay-filter="apTableEvent">

    </table>
</div>

</body>
</html>

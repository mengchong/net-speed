<!DOCTYPE html>
<html class="x-admin-sm">

<head>
    <meta charset="UTF-8">
    <title>阈值设置页面</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <link rel="stylesheet" href="../css/font.css">
    <link rel="stylesheet" href="../js/lib/layui/css/layui.css">
    <link rel="stylesheet" href="../css/xadmin.css">
    <link rel="stylesheet" href="../css/graphical/yuzhizhezhi.css">
    <script src="../js/lib/layui/layui.js" charset="utf-8"></script>
    <script type="text/javascript" src="../js/xadmin.js"></script>
    <!-- 让IE8/9支持媒体查询，从而兼容栅格 -->
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form" id="form">
            <div class="layui-form-item">
                <label for="signalValue" class="yuzhi-label">
                    平均信号强度大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="signalValue" name="signalValue" autocomplete="off" class="layui-input">
                </div>
                <label for="signalValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="upstreamValue" class="yuzhi-label">
                    上行速率大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="upstreamValue" name="upstreamValue" autocomplete="off" class="layui-input">
                </div>
                <label for="upstreamValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="downValue" class="yuzhi-label">
                    下行速率大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="downValue" name="downValue" autocomplete="off" class="layui-input">
                </div>
                <label for="downValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="webSuccessValue" class="yuzhi-label">
                    网页成功率大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="webSuccessValue" name="webSuccessValue" autocomplete="off" class="layui-input">
                </div>
                <label for="webSuccessValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="webFirstValue" class="yuzhi-label">
                    网页首页时延大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="webFirstValue" name="webFirstValue" autocomplete="off" class="layui-input">
                </div>
                <label for="webFirstValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="videoValue" class="yuzhi-label">
                    视频播放成功大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="videoValue" name="videoValue" autocomplete="off" class="layui-input">
                </div>
                <label for="videoValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="pingDelayValue" class="yuzhi-label">
                    Ping时延大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="pingDelayValue" name="pingDelayValue" autocomplete="off" class="layui-input">
                </div>
                <label for="pingDelayValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="pingPackageValue" class="yuzhi-label">
                    Ping丢包率大于等于
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="pingPackageValue" name="pingPackageValue" autocomplete="off" class="layui-input">
                </div>
                <label for="pingPackageValue" class="yuzhi-content">
                    为合格
                </label>
            </div>
            <div class="layui-form-item">
                <label for="authSuccessValue" class="yuzhi-label">
                    认证接入成功率基础值
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="authSuccessValue" name="authSuccessValue" autocomplete="off" class="layui-input">
                </div>
                <label for="authSuccessSection" class="yuzhi-content">
                    数据波动区间上下
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="authSuccessSection" name="authSuccessSection" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label for="authDelayValue" class="yuzhi-label">
                    认证接入时延基础值
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="authDelayValue" name="authDelayValue" autocomplete="off" class="layui-input">
                </div>
                <label for="authDelaySection" class="yuzhi-content">
                    数据波动区间上下
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="authDelaySection" name="authDelaySection" autocomplete="off" class="layui-input">
                </div>
                <div class="layui-input-inline " style="display: none">
                    <input type="text" value="1" name="id" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label  class="layui-form-label">
                </label>
                <button class="layui-btn" lay-filter="add" lay-submit="">
                    保存
                </button>
            </div>
        </form>
    </div>
</div>
<script>
    layui.use(['form', 'layer'],
        function () {
            $ = layui.jquery;
            var form = layui.form,
                layer = layui.layer;

            //监听提交
            form.on('submit(add)', function (data) {
                //发异步，把数据提交给后台
                $.ajax({
                    url: '/vesapp/thresholdSetting/update.do',
                    dataType: 'json',
                    type: 'post',
                    contentType: "application/json",
                    data: JSON.stringify(data.field),
                    success: function (data) {
                        if (data.code === 200) {
                            layer.alert("修改成功", {
                                    icon: 6
                                });
                        }else{
                            layer.alter("修改失败...");
                        }

                    }
                });
                return false;
            });

            $.ajax({
                url: '/vesapp/thresholdSetting/get.do?id=1',
                dataType: 'json',
                type: 'get',
                contentType: "application/json",
                success: function (data) {
                    var result=data.data;
                    $('#signalValue').val(result.signalValue);
                    $('#upstreamValue').val(result.upstreamValue);
                    $('#downValue').val(result.downValue);
                    $('#webSuccessValue').val(result.webSuccessValue);
                    $('#webFirstValue').val(result.webFirstValue);
                    $('#videoValue').val(result.videoValue);
                    $('#pingDelayValue').val(result.pingDelayValue);
                    $('#pingPackageValue').val(result.pingPackageValue);
                    $('#authSuccessValue').val(result.authSuccessValue);
                    $('#authDelayValue').val(result.authDelayValue);
                    $('#authSuccessSection').val(result.authSuccessSection);
                    $('#authDelaySection').val(result.authDelaySection);
                }
            });
        });
</script>
</body>

</html>

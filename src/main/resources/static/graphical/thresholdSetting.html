    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">体验测速阈值设置</div>
                <div class="layui-card-body ">
                    <form class="layui-form">
                        <div class="layui-form-item">
                            <label class="layui-form-label" style="width: 8%">
                                网速值大于等于：
                            </label>
                            <div class="layui-input-inline" style="width: 80px">
                                <input type="number" id="networkPassValue" name="networkPassValue" required=""
                                       lay-verify="required" autocomplete="off" class="layui-input">
                            </div>
                            <label class="layui-form-label" style="width: auto">
                                KB/S为合格
                            </label>
                        </div>
                        <div class="layui-card-header">Ping测速阈值设置</div>
                        <div class="layui-form-item" style="padding-top: 10px">

                            <label class="layui-form-label" style="width: 8%">丢包率小于：</label>

                            <div class="layui-input-inline" style="width: 80px">
                                <input type="number" id="lostPacketRatePassValue" name="lostPacketRatePassValue"
                                       required=""
                                       lay-verify="required" autocomplete="off" class="layui-input">
                            </div>

                            <label class="layui-form-label" style="width: auto">%或延迟小于</label>

                            <div class="layui-input-inline" style="width: 80px">
                                <input type="number" id="delayPassValue" name="delayPassValue" required=""
                                       lay-verify="required" autocomplete="off" class="layui-input">
                            </div>

                            <label class="layui-form-label" style="width: auto">ms为合格</label>

                        </div>
                        <div class="layui-card-header">网络测速阈值设置</div>
                        <div class="layui-form-item" style="padding-top: 10px">
                            <label class="layui-form-label" style="width: 8%">
                                延迟小于：
                            </label>
                            <div class="layui-input-inline" style="width: 80px">
                                <input type="number" id="networkDelayPassValue" name="networkDelayPassValue" required=""
                                       lay-verify="required" autocomplete="off" class="layui-input">
                            </div>
                            <label class="layui-form-label" style="width: auto;">
                                ms为合格
                            </label>
                        </div>
                        <div class="layui-form-item" align="right">
                            <button type="button" class="layui-btn" lay-submit lay-filter="save">保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

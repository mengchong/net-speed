<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AP</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <link rel="stylesheet" href="../js/lib/layui/css/layui.css">
    <link rel="stylesheet" href="../css/font.css">
    <link rel="stylesheet" href="../css/xadmin.css">
    <script src="../js/lib/layui/layui.js" charset="utf-8"></script>
    <script type="text/javascript" src="../js/xadmin.js"></script>
    <script type="text/javascript" src="../js/echarts.min.js"></script>
    <script type="text/javascript" src="APIndex.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

    <style>
        #main1 {
            width: 95%;
            height: 300px;
            padding-left: 3%
        }
    </style>
</head>
<body>
<div class="x-nav">
          <span class="layui-breadcrumb">
            <a>
              <cite>AP</cite></a>
          </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i></a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body ">
                    <form class="layui-form layui-col-space5">
                        <div class="layui-form-item">
                            <label class="layui-form-label">指标</label>
                            <div class="layui-input-block" id="type">
                                <input type="radio" name="type" value="flow" title="流量" checked="">
                                <input type="radio" name="type" value="time" title="用户时长">
                                <!--<input type="radio" name="sex" value="禁" title="禁用" disabled="">-->
                            </div>
                        </div>
                    </form>
                    <form class="layui-form layui-col-space5">
                        <div class="layui-form-item">
                            <label class="layui-form-label">TOP/N</label>
                            <div class="layui-input-block" id="TOP" data-type="reload">
                                <input type="radio" name="TOP" value="5" title="TOP5" checked="">
                                <input type="radio" name="TOP" value="10" title="TOP10">
                                <!--<input type="radio" name="sex" value="禁" title="禁用" disabled="">-->
                            </div>
                        </div>
                    </form>
                    <form class="layui-form layui-col-space5">
                        <div class="layui-form-item">
                            <label class="layui-form-label">时间</label>
                            <div class="layui-input-block" id="lastTime" data-type="reload">
                                <input type="radio" name="lastTime" value="1w" title="最近一周" checked="">
                                <input type="radio" name="lastTime" value="1m" title="最近一个月">
                                <!--<input type="radio" name="sex" value="禁" title="禁用" disabled="">-->
                            </div>
                        </div>
                    </form>
                </div>

                <div class="layui-card-body">
                    <div id="main1" class="layui-col-space5"></div>
                </div>

                <div class="layui-card-body layui-table-body layui-table-main" style="padding-left: 4%">
                    <table class="layui-table layui-form" id="contentTable">

                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

</body>
</html>
